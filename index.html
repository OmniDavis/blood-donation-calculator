<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Blood Donation Calculator</title>
</head>
<body>
    <h1>Calculadora de Compatibilidad Sanguinea</h1>

    <label>Selecciona tu tipo sanguineo:</label>
    <select id="bloodType">
        <option value="O-">O-</option>
        <option value="O+">O+</option>
        <option value="A-">A-</option>
        <option value="A+">A+</option>
        <option value="B-">B-</option>
        <option value="B+">B+</option>
        <option value="AB-">AB-</option>
        <option value="AB+">AB+</option>
    </select>

    <button onclick="calculate()">Calcular</button>

    <h3 id="result"></h3>

    <script>
        const compatibility = {
            "O-": { donate: "Todos", receive: "O-" },
            "O+": { donate: "O+, A+, B+, AB+", receive: "O+, O-" },
            "A-": { donate: "A-, A+, AB-, AB+", receive: "A-, O-" },
            "A+": { donate: "A+, AB+", receive: "A+, A-, O+, O-" },
            "B-": { donate: "B-, B+, AB-, AB+", receive: "B-, O-" },
            "B+": { donate: "B+, AB+", receive: "B+, B-, O+, O-" },
            "AB-": { donate: "AB-, AB+", receive: "A-, B-, O-, AB-" },
            "AB+": { donate: "AB+", receive: "Todos" }
        };

        function calculate() {
            const type = document.getElementById("bloodType").value;
            const result = compatibility[type];
            document.getElementById("result").innerHTML =
                "Puede donar a: " + result.donate + "<br>" +
                "Puede recibir de: " + result.receive;
        }
    </script>
</body>
</html>
